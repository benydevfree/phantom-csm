server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: ${GRAFANA_LOKI_URL}  # https://logs-prod-XXX.grafana.net/loki/api/v1/push
    basic_auth:
      username: ${GRAFANA_LOKI_USER}
      password: ${GRAFANA_LOKI_TOKEN}

scrape_configs:
  - job_name: phantom-csm
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            siteId: siteId
            reqId: reqId
      - labels:
          level:
          service:
