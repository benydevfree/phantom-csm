version: 2.1

orbs:
  node: circleci/node@5

# ── Reusable commands ─────────────────────────────────────────────────────────
commands:

  install-pulumi:
    steps:
      - run:
          name: Install Pulumi CLI
          command: |
            curl -fsSL https://get.pulumi.com | sh
            echo 'export PATH=$HOME/.pulumi/bin:$PATH' >> "$BASH_ENV"
      - run:
          name: Install infra deps
          command: cd infra && npm ci

  install-ansible:
    steps:
      - run:
          name: Install Ansible + community.docker collection
          command: |
            pip install ansible
            ansible-galaxy collection install community.docker

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  typecheck:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: TypeScript — type-check
          command: npx tsc --noEmit

  build:
    docker:
      - image: cimg/node:22.0
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run:
          name: Compile TypeScript
          command: npm run build
      - persist_to_workspace:
          root: .
          paths: [dist]

  docker-build-push:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Docker login
          command: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
      - run:
          name: Build image (with layer cache)
          command: |
            docker build \
              --cache-from "$DOCKER_USERNAME/phantom-csm:latest" \
              --tag "$DOCKER_USERNAME/phantom-csm:$CIRCLE_SHA1" \
              --tag "$DOCKER_USERNAME/phantom-csm:latest" \
              .
      - run:
          name: Push image
          command: |
            docker push "$DOCKER_USERNAME/phantom-csm:$CIRCLE_SHA1"
            docker push "$DOCKER_USERNAME/phantom-csm:latest"

  integration-test:
    machine:
      image: ubuntu-2204:current
    steps:
      - checkout
      - attach_workspace:
          at: .
      - run:
          name: Start infra services
          command: docker compose up -d postgres redis rabbitmq
      - run:
          name: Wait for services (healthchecks)
          command: |
            until docker compose ps postgres | grep -q "healthy"; do sleep 2; done
            until docker compose ps redis   | grep -q "healthy"; do sleep 2; done
            until docker compose ps rabbitmq | grep -q "healthy"; do sleep 2; done
          no_output_timeout: 60s
      - run:
          name: Run migration
          command: |
            DATABASE_URL=postgresql://phantom:phantom@localhost:5432/phantom_csm \
              node dist/migrate.js
      - run:
          name: Start API and health check
          command: |
            NODE_ENV=test \
            DATABASE_URL=postgresql://phantom:phantom@localhost:5432/phantom_csm \
            RABBITMQ_URL=amqp://phantom:phantom@localhost:5672 \
            REDIS_URL=redis://localhost:6379 \
            JWT_SECRET=test-secret \
              node dist/index.js &
            sleep 4
            curl -sf http://localhost:3000/health
      - run:
          name: Tear down
          command: docker compose down -v
          when: always

  pulumi-preview:
    docker:
      - image: cimg/python:3.12-node
    steps:
      - checkout
      - install-pulumi
      - run:
          name: Pulumi preview (staging)
          command: |
            cd infra
            pulumi stack select staging
            pulumi preview
          environment:
            PULUMI_ACCESS_TOKEN: $PULUMI_ACCESS_TOKEN
            HCLOUD_TOKEN: $HCLOUD_TOKEN

  pulumi-up-staging:
    docker:
      - image: cimg/python:3.12-node
    steps:
      - checkout
      - install-pulumi
      - run:
          name: Pulumi up — staging
          command: |
            cd infra
            pulumi stack select staging
            pulumi up --yes --skip-preview
          environment:
            PULUMI_ACCESS_TOKEN: $PULUMI_ACCESS_TOKEN
            HCLOUD_TOKEN: $HCLOUD_TOKEN
      - run:
          name: Export server IP
          command: |
            cd infra
            pulumi stack output publicIp > /tmp/server-ip.txt
            cat /tmp/server-ip.txt
      - persist_to_workspace:
          root: /tmp
          paths: [server-ip.txt]

  ansible-deploy-staging:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - install-ansible
      - run:
          name: Add SSH key to known hosts
          command: |
            SERVER_IP=$(cat /tmp/server-ip.txt)
            mkdir -p ~/.ssh
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
      - run:
          name: Write SSH private key
          command: |
            echo "$ANSIBLE_SSH_KEY" | base64 -d > ~/.ssh/phantom-csm.pem
            chmod 600 ~/.ssh/phantom-csm.pem
      - run:
          name: Ansible — deploy
          command: |
            SERVER_IP=$(cat /tmp/server-ip.txt)
            ansible-playbook ansible/playbooks/deploy.yml \
              -e phantom_ip="$SERVER_IP" \
              -e image_tag="$CIRCLE_SHA1"
          environment:
            DOCKER_USERNAME:    $DOCKER_USERNAME
            DOCKER_PASSWORD:    $DOCKER_PASSWORD
            DB_PASSWORD:        $DB_PASSWORD
            RABBITMQ_PASSWORD:  $RABBITMQ_PASSWORD
            JWT_SECRET:         $JWT_SECRET

  pulumi-up-prod:
    docker:
      - image: cimg/python:3.12-node
    steps:
      - checkout
      - install-pulumi
      - run:
          name: Pulumi up — production
          command: |
            cd infra
            pulumi stack select prod
            pulumi up --yes --skip-preview
          environment:
            PULUMI_ACCESS_TOKEN: $PULUMI_ACCESS_TOKEN
            HCLOUD_TOKEN: $HCLOUD_TOKEN
      - run:
          name: Export server IP
          command: |
            cd infra && pulumi stack output publicIp > /tmp/server-ip.txt
      - persist_to_workspace:
          root: /tmp
          paths: [server-ip.txt]

  ansible-deploy-prod:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - attach_workspace:
          at: /tmp
      - install-ansible
      - run:
          name: Add SSH key to known hosts
          command: |
            SERVER_IP=$(cat /tmp/server-ip.txt)
            mkdir -p ~/.ssh
            ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
      - run:
          name: Write SSH private key
          command: |
            echo "$ANSIBLE_SSH_KEY" | base64 -d > ~/.ssh/phantom-csm.pem
            chmod 600 ~/.ssh/phantom-csm.pem
      - run:
          name: Ansible — deploy (production)
          command: |
            SERVER_IP=$(cat /tmp/server-ip.txt)
            ansible-playbook ansible/playbooks/deploy.yml \
              -e phantom_ip="$SERVER_IP" \
              -e image_tag="$CIRCLE_SHA1"
          environment:
            DOCKER_USERNAME:    $DOCKER_USERNAME
            DOCKER_PASSWORD:    $DOCKER_PASSWORD
            DB_PASSWORD:        $DB_PROD_PASSWORD
            RABBITMQ_PASSWORD:  $RABBITMQ_PROD_PASSWORD
            JWT_SECRET:         $JWT_PROD_SECRET

# ── Workflows ─────────────────────────────────────────────────────────────────
workflows:

  # Every branch: type-check + build
  ci:
    jobs:
      - typecheck
      - build:
          requires: [typecheck]

  # main → staging pipeline (fully automated)
  staging:
    jobs:
      - typecheck:
          filters: { branches: { only: main } }
      - build:
          requires: [typecheck]
          filters: { branches: { only: main } }
      - docker-build-push:
          requires: [build]
          filters: { branches: { only: main } }
      - integration-test:
          requires: [build]
          filters: { branches: { only: main } }
      - pulumi-preview:
          requires: [integration-test]
          filters: { branches: { only: main } }
      - pulumi-up-staging:
          requires: [docker-build-push, pulumi-preview]
          filters: { branches: { only: main } }
      - ansible-deploy-staging:
          requires: [pulumi-up-staging]
          filters: { branches: { only: main } }

  # main → prod pipeline (manual gate)
  production:
    jobs:
      - docker-build-push:
          filters: { branches: { only: main } }
      - hold-prod:
          type: approval
          requires: [docker-build-push]
          filters: { branches: { only: main } }
      - pulumi-up-prod:
          requires: [hold-prod]
          filters: { branches: { only: main } }
      - ansible-deploy-prod:
          requires: [pulumi-up-prod]
          filters: { branches: { only: main } }
